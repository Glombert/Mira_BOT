name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/mira_agent
            git pull origin main
            /root/mira_agent/venv/bin/pip install -r requirements.txt -q
            # Изоляция run_python
            which firejail >/dev/null 2>&1 || apt-get install -y firejail -q
            chmod +x /root/mira_agent/scripts/notify.sh
            # Watchdog: cron каждые 5 минут проверяет что бот жив
            (crontab -l 2>/dev/null | grep -v "notify.sh"; \
             echo "*/2 * * * * systemctl is-active --quiet mira-bot || /root/mira_agent/scripts/notify.sh") \
             | crontab -
            systemctl restart mira-bot
            systemctl status mira-bot --no-pager
            # Веб-интерфейс
            if [ -f /etc/systemd/system/mira-web.service ]; then
              systemctl restart mira-web
              systemctl status mira-web --no-pager
            fi
            # Nginx — перезагружаем конфиг если запущен
            if systemctl is-active --quiet nginx; then
              systemctl reload nginx
            fi
