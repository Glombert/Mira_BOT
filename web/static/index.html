<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мира</title>
  <style>
    :root {
      --bg:        #f5f5f7;
      --surface:   #ffffff;
      --mira:      #6d4aff;
      --mira-soft: #ede8ff;
      --user-soft: #e5e5ea;
      --text:      #1c1c1e;
      --muted:     #8e8e93;
      --border:    #d1d1d6;
      --radius:    18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text);
      height: 100dvh; display: flex; flex-direction: column; align-items: center;
    }
    header {
      width: 100%; max-width: 720px;
      padding: 16px 20px 12px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border); background: var(--surface);
    }
    .avatar {
      width: 36px; height: 36px; background: var(--mira); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; color: white; font-size: 18px;
    }
    header h1 { font-size: 17px; font-weight: 600; }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ccc; margin-left: auto; transition: background 0.3s;
    }
    #status-dot.online   { background: #34c759; }
    #status-dot.thinking { background: var(--mira); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    #messages {
      flex: 1; width: 100%; max-width: 720px;
      overflow-y: auto; padding: 16px 16px 8px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .msg {
      max-width: 78%; padding: 10px 14px;
      border-radius: var(--radius); font-size: 15px;
      line-height: 1.5; white-space: pre-wrap; word-break: break-word;
    }
    .msg.mira  { align-self:flex-start; background:var(--mira-soft); border-bottom-left-radius:4px; }
    .msg.user  { align-self:flex-end;   background:var(--user-soft); border-bottom-right-radius:4px; }
    .msg.error { align-self:center; background:#fee; color:#c00; font-size:13px; border-radius:8px; }

    .thinking-dots {
      display:flex; gap:4px; align-items:center;
      padding:12px 16px; background:var(--mira-soft);
      border-radius:var(--radius); border-bottom-left-radius:4px; align-self:flex-start;
    }
    .thinking-dots span {
      width:7px; height:7px; border-radius:50%;
      background:var(--mira); animation: dot 1.2s infinite;
    }
    .thinking-dots span:nth-child(2){animation-delay:.2s}
    .thinking-dots span:nth-child(3){animation-delay:.4s}
    @keyframes dot{0%,80%,100%{transform:scale(1);opacity:.4}40%{transform:scale(1.3);opacity:1}}

    #input-area {
      width:100%; max-width:720px; padding:10px 16px 16px;
      background:var(--surface); border-top:1px solid var(--border);
      display:flex; gap:10px; align-items:flex-end;
    }
    textarea {
      flex:1; border:1px solid var(--border); border-radius:12px;
      padding:10px 14px; font-size:15px; font-family:inherit;
      resize:none; min-height:42px; max-height:160px;
      outline:none; background:var(--bg); line-height:1.4; transition:border-color .2s;
    }
    textarea:focus { border-color:var(--mira); }
    button#send {
      width:42px; height:42px; border:none; border-radius:50%;
      background:var(--mira); color:white; font-size:20px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:opacity .2s; flex-shrink:0;
    }
    button#send:disabled { opacity:.4; cursor:default; }

    /* Login overlay */
    #login-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.5);
      display:flex; align-items:center; justify-content:center; z-index:10;
    }
    #login-box {
      background:var(--surface); border-radius:20px;
      padding:36px 28px; width:340px; text-align:center;
      display:flex; flex-direction:column; align-items:center; gap:20px;
    }
    #login-box .logo { font-size:48px; }
    #login-box h2    { font-size:22px; font-weight:700; }
    #login-box p     { font-size:14px; color:var(--muted); line-height:1.5; }
    #tg-btn-wrap     { min-height:48px; display:flex; align-items:center; justify-content:center; }
  </style>
</head>
<body>

<div id="login-overlay">
  <div id="login-box">
    <div class="logo">🌟</div>
    <h2>Мира</h2>
    <p>Войди через Telegram чтобы начать общение</p>
    <div id="tg-btn-wrap">
      <!-- Telegram Login Widget появится здесь -->
      <p id="bot-hint" style="color:var(--muted);font-size:13px">Загрузка...</p>
    </div>
  </div>
</div>

<header>
  <div class="avatar">✦</div>
  <div><h1>Мира</h1></div>
  <div id="status-dot"></div>
</header>

<div id="messages"></div>

<div id="input-area">
  <textarea id="input" placeholder="Напиши Мире..." rows="1"></textarea>
  <button id="send" disabled>↑</button>
</div>

<script>
  const SESSION_KEY = "mira_session";
  const msgs        = document.getElementById("messages");
  const input       = document.getElementById("input");
  const sendBtn     = document.getElementById("send");
  const statusDot   = document.getElementById("status-dot");
  const overlay     = document.getElementById("login-overlay");

  let ws      = null;
  let thinking = null;

  function getSession() { return localStorage.getItem(SESSION_KEY) || ""; }

  function connect() {
    const session = getSession();
    const proto   = location.protocol === "https:" ? "wss" : "ws";
    const url     = `${proto}://${location.host}/ws?session=${encodeURIComponent(session)}`;

    ws = new WebSocket(url);
    ws.onopen = () => {};

    ws.onmessage = ({ data }) => {
      const msg = JSON.parse(data);
      if (msg.type === "auth_required") {
        showLogin(msg.bot);
      } else if (msg.type === "ready") {
        overlay.style.display = "none";
        statusDot.className   = "online";
        sendBtn.disabled      = false;
      } else if (msg.type === "thinking") {
        showThinking();
      } else if (msg.type === "message") {
        hideThinking();
        addMsg("mira", msg.content);
        statusDot.className = "online";
        sendBtn.disabled    = false;
      } else if (msg.type === "error") {
        hideThinking();
        addMsg("error", msg.content);
        statusDot.className = "online";
        sendBtn.disabled    = false;
      }
    };

    ws.onclose = (e) => {
      statusDot.className = "";
      sendBtn.disabled    = true;
      hideThinking();
      if (e.code === 4001) {
        localStorage.removeItem(SESSION_KEY);
        // Не переподключаемся — ждём авторизации через Telegram
      } else {
        setTimeout(connect, 3000);
      }
    };

    ws.onerror = () => ws.close();
  }

  // Вызывается Telegram виджетом напрямую в основном окне
  window.onTelegramAuth = function(user) {
    fetch("/auth/telegram?" + new URLSearchParams(user))
      .then(r => r.json())
      .then(data => {
        if (data.ok && data.session) {
          localStorage.setItem(SESSION_KEY, data.session);
          overlay.style.display = "none";
          connect();
        } else {
          alert("Ошибка авторизации. Попробуй ещё раз.");
        }
      })
      .catch(() => alert("Ошибка сети. Попробуй ещё раз."));
  };

  function showLogin(botUsername) {
    overlay.style.display = "flex";
    if (!botUsername) {
      document.getElementById("bot-hint").textContent = "Бот не настроен (нет TELEGRAM_BOT_USERNAME)";
      return;
    }
    const wrap = document.getElementById("tg-btn-wrap");
    if (wrap.querySelector("script")) return; // уже добавлен
    const script = document.createElement("script");
    script.src = "https://telegram.org/js/telegram-widget.js?22";
    script.setAttribute("data-telegram-login", botUsername);
    script.setAttribute("data-size", "large");
    script.setAttribute("data-onauth", "onTelegramAuth(user)");
    script.setAttribute("data-request-access", "write");
    script.async = true;
    wrap.appendChild(script);
  }

  function send() {
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    addMsg("user", text);
    ws.send(JSON.stringify({ type: "message", content: text }));
    input.value = "";
    input.style.height = "auto";
    sendBtn.disabled    = true;
    statusDot.className = "thinking";
  }

  function addMsg(role, text) {
    const el = document.createElement("div");
    el.className  = `msg ${role}`;
    el.textContent = text;
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showThinking() {
    if (thinking) return;
    thinking = document.createElement("div");
    thinking.className = "thinking-dots";
    thinking.innerHTML = "<span></span><span></span><span></span>";
    msgs.appendChild(thinking);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideThinking() {
    if (thinking) { thinking.remove(); thinking = null; }
  }

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 160) + "px";
  });
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener("click", send);

  setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "ping" }));
  }, 25000);

  connect();
</script>
</body>
</html>
