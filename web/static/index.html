<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mira</title>
  <style>
    :root {
      --bg:         #080f1e;
      --surface:    #0d1830;
      --surface2:   #111f3a;
      --blue:       #3b82f6;
      --purple:     #8b5cf6;
      --blue-soft:  rgba(59,130,246,0.12);
      --purple-soft:rgba(139,92,246,0.12);
      --text:       #e2e8f0;
      --muted:      #64748b;
      --border:     rgba(59,130,246,0.2);
      --glow:       rgba(91,133,246,0.25);
      --radius:     16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text);
      height: 100dvh; display: flex; flex-direction: column; align-items: center;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.06) 0%, transparent 60%);
    }

    /* ---- HEADER ---- */
    header {
      width: 100%; max-width: 760px;
      padding: 14px 20px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(13,24,48,0.9);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 5;
    }

    .logo-svg { width: 38px; height: 38px; flex-shrink: 0; }

    .header-title { flex: 1; }
    .header-title h1 {
      font-size: 18px; font-weight: 700; letter-spacing: .5px;
      background: linear-gradient(90deg, var(--blue), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-title span { font-size: 12px; color: var(--muted); }

    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted); transition: all .3s;
      box-shadow: none;
    }
    #status-dot.online   { background: #22c55e; box-shadow: 0 0 8px #22c55e80; }
    #status-dot.thinking { background: var(--blue); box-shadow: 0 0 8px var(--blue); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ---- COMMANDS BAR ---- */
    #cmd-bar {
      width: 100%; max-width: 760px;
      padding: 8px 16px;
      display: flex; gap: 8px; flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      background: rgba(13,24,48,0.7);
    }
    .cmd-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--blue-soft);
      color: var(--blue); font-size: 12px; cursor: pointer;
      transition: all .2s; white-space: nowrap;
    }
    .cmd-btn:hover { background: rgba(59,130,246,0.2); border-color: var(--blue); }
    .cmd-btn.danger { color: #f87171; background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); }
    .cmd-btn.danger:hover { background: rgba(239,68,68,0.15); }
    .cmd-btn svg { width: 13px; height: 13px; }

    /* ---- FILES PANEL ---- */
    #files-panel {
      display: none;
      width: 100%; max-width: 760px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 12px 16px;
    }
    #files-panel h3 { font-size: 13px; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .5px; }
    .file-section { margin-bottom: 12px; }
    .file-section-title { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .file-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 10px; border-radius: 8px;
      background: var(--surface2); margin-bottom: 4px;
    }
    .file-item span { font-size: 13px; color: var(--text); }
    .file-item small { font-size: 11px; color: var(--muted); margin-left: 8px; }
    .file-dl {
      padding: 4px 10px; border-radius: 6px; font-size: 12px;
      background: var(--blue-soft); color: var(--blue);
      text-decoration: none; border: 1px solid var(--border);
    }
    .file-dl:hover { background: rgba(59,130,246,0.2); }
    #files-empty { font-size: 13px; color: var(--muted); text-align: center; padding: 10px 0; }

    /* ---- MESSAGES ---- */
    #messages {
      flex: 1; width: 100%; max-width: 760px;
      overflow-y: auto; padding: 20px 16px 12px;
      display: flex; flex-direction: column; gap: 10px;
      scrollbar-width: thin; scrollbar-color: var(--surface2) transparent;
    }

    .msg {
      max-width: 76%; padding: 11px 16px;
      font-size: 15px; line-height: 1.6;
      white-space: pre-wrap; word-break: break-word;
      border-radius: var(--radius);
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

    .msg.mira {
      align-self: flex-start;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      box-shadow: 0 0 20px var(--glow);
    }
    .msg.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #1e3a8a, #4c1d95);
      border: 1px solid rgba(139,92,246,0.3);
      border-bottom-right-radius: 4px;
    }
    .msg.system {
      align-self: center; max-width: 90%;
      background: rgba(59,130,246,0.08);
      border: 1px solid rgba(59,130,246,0.15);
      border-radius: 10px;
      color: var(--muted); font-size: 13px; text-align: center;
    }
    .msg.error {
      align-self: center;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px;
      color: #f87171; font-size: 13px;
    }

    /* ---- THINKING ---- */
    .thinking-wrap {
      align-self: flex-start;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius); border-bottom-left-radius: 4px;
      padding: 12px 18px;
      display: flex; gap: 5px; align-items: center;
    }
    .thinking-wrap span {
      width: 7px; height: 7px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      animation: dot 1.2s infinite;
    }
    .thinking-wrap span:nth-child(2){animation-delay:.2s}
    .thinking-wrap span:nth-child(3){animation-delay:.4s}
    @keyframes dot{0%,80%,100%{transform:scale(1);opacity:.4}40%{transform:scale(1.4);opacity:1}}

    /* ---- INPUT ---- */
    #input-area {
      width: 100%; max-width: 760px;
      padding: 12px 16px 16px;
      background: rgba(13,24,48,0.9);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(12px);
      display: flex; gap: 10px; align-items: flex-end;
    }
    textarea {
      flex: 1; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 14px;
      padding: 11px 16px; color: var(--text);
      font-size: 15px; font-family: inherit;
      resize: none; min-height: 44px; max-height: 160px;
      outline: none; line-height: 1.5; transition: border-color .2s, box-shadow .2s;
    }
    textarea::placeholder { color: var(--muted); }
    textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .attach-btn {
      width: 40px; height: 40px; flex-shrink: 0;
      border: 1px solid var(--border); border-radius: 50%;
      background: var(--surface2); color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .2s;
    }
    .attach-btn:hover { color: var(--blue); border-color: var(--blue); background: var(--blue-soft); }

    #send {
      width: 44px; height: 44px; flex-shrink: 0;
      border: none; border-radius: 50%; cursor: pointer;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: white; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .2s, transform .1s;
      box-shadow: 0 4px 15px var(--glow);
    }
    #send:hover { transform: scale(1.05); }
    #send:active { transform: scale(.95); }
    #send:disabled { opacity: .35; cursor: default; transform: none; box-shadow: none; }

    /* ---- LOGIN OVERLAY ---- */
    #login-overlay {
      position: fixed; inset: 0; z-index: 20;
      background: rgba(8,15,30,0.95);
      backdrop-filter: blur(16px);
      display: flex; align-items: center; justify-content: center;
    }
    #login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 32px; width: 360px; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      box-shadow: 0 0 60px rgba(59,130,246,0.15);
    }
    #login-box h2 {
      font-size: 28px; font-weight: 800; letter-spacing: 1px;
      background: linear-gradient(90deg, var(--blue), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #login-box p { font-size: 14px; color: var(--muted); line-height: 1.6; }
    #tg-btn-wrap { min-height: 50px; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-overlay">
  <div id="login-box">
    <svg class="logo-svg" style="width:64px;height:64px" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#3b82f6"/>
          <stop offset="100%" stop-color="#8b5cf6"/>
        </linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <circle cx="50" cy="50" r="44" fill="none" stroke="url(#lg)" stroke-width="1.5" opacity=".6"/>
      <path d="M50 6 L56 44 L50 50 L44 44 Z" fill="url(#lg)"/>
      <path d="M94 50 L56 56 L50 50 L56 44 Z" fill="url(#lg)" opacity=".7"/>
      <path d="M50 94 L44 56 L50 50 L56 56 Z" fill="url(#lg)"/>
      <path d="M6 50 L44 44 L50 50 L44 56 Z" fill="url(#lg)" opacity=".7"/>
      <polygon points="50,38 53,47 62,50 53,53 50,62 47,53 38,50 47,47" fill="white" filter="url(#glow)" opacity=".95"/>
      <circle cx="50" cy="18" r="2.5" fill="url(#lg)"/>
      <circle cx="82" cy="50" r="2.5" fill="url(#lg)" opacity=".7"/>
      <circle cx="50" cy="82" r="2.5" fill="url(#lg)"/>
      <circle cx="18" cy="50" r="2.5" fill="url(#lg)" opacity=".7"/>
    </svg>
    <h2>MIRA_BOT</h2>
    <p>Персональный ИИ-помощник<br>Войди через Telegram чтобы начать</p>
    <div id="tg-btn-wrap"><span style="color:var(--muted);font-size:13px">Загрузка...</span></div>
  </div>
</div>

<!-- HEADER -->
<header>
  <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3b82f6"/>
        <stop offset="100%" stop-color="#8b5cf6"/>
      </linearGradient>
    </defs>
    <circle cx="50" cy="50" r="44" fill="none" stroke="url(#hg)" stroke-width="1.5" opacity=".5"/>
    <path d="M50 6 L56 44 L50 50 L44 44 Z" fill="url(#hg)"/>
    <path d="M94 50 L56 56 L50 50 L56 44 Z" fill="url(#hg)" opacity=".7"/>
    <path d="M50 94 L44 56 L50 50 L56 56 Z" fill="url(#hg)"/>
    <path d="M6 50 L44 44 L50 50 L44 56 Z" fill="url(#hg)" opacity=".7"/>
    <polygon points="50,38 53,47 62,50 53,53 50,62 47,53 38,50 47,47" fill="white" opacity=".9"/>
  </svg>
  <div class="header-title">
    <h1>MIRA_BOT</h1>
    <span id="user-name">Персональный ассистент</span>
  </div>
  <div id="status-dot"></div>
</header>

<!-- COMMANDS -->
<div id="cmd-bar">
  <button class="cmd-btn" onclick="sendCmd('whoami')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    Профиль
  </button>
  <button class="cmd-btn" onclick="sendCmd('files')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    Файлы
  </button>
  <button class="cmd-btn" onclick="sendCmd('clear')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
    Очистить чат
  </button>
  <button class="cmd-btn danger" onclick="sendCmd('forget')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
    Сброс профиля
  </button>
  <span style="color:var(--muted);margin:0 4px">|</span>
  <button class="cmd-btn" onclick="sendCmd('gdrive_login')" title="Google Drive">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M2 12h2l4-8h8l4 8h2"/><path d="M6 12h12v8a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2z"/></svg>
    Drive
  </button>
  <button class="cmd-btn" onclick="sendCmd('gcal')" title="Календарь">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Календарь
  </button>
  <button class="cmd-btn" onclick="sendCmd('reminders')" title="Напоминания">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Напоминания
  </button>
</div>
<div id="guest-counter" style="display:none;width:100%;max-width:760px;padding:4px 16px;background:rgba(239,68,68,0.08);border-bottom:1px solid rgba(239,68,68,0.15);text-align:center;font-size:12px;color:#f87171"></div>

<!-- FILES PANEL -->
<div id="files-panel">
  <h3>Файлы рабочего пространства</h3>
  <div id="files-content"><p id="files-empty">Нет файлов</p></div>
</div>

<!-- MESSAGES -->
<div id="messages"></div>

<!-- INPUT -->
<div id="input-area">
  <input type="file" id="file-input" style="display:none" multiple onchange="uploadFiles(this.files)">
  <button class="attach-btn" onclick="document.getElementById('file-input').click()" title="Прикрепить файл">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
      <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
    </svg>
  </button>
  <textarea id="input" placeholder="Напиши Мире..." rows="1"></textarea>
  <button id="send" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20">
      <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
    </svg>
  </button>
</div>

<script>
  const SESSION_KEY = "mira_session";
  const msgsEl  = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const dot     = document.getElementById("status-dot");
  const overlay = document.getElementById("login-overlay");

  let ws = null, thinkEl = null;

  function sess() { return localStorage.getItem(SESSION_KEY) || ""; }

  /* WebSocket */
  function connect() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}/ws?session=${encodeURIComponent(sess())}`);

    ws.onmessage = ({data}) => {
      const m = JSON.parse(data);
      if (m.type === "auth_required") {
        showLogin(m.bot);
      } else if (m.type === "ready") {
        overlay.style.display = "none";
        dot.className = "online";
        sendBtn.disabled = false;
        if (m.name) document.getElementById("user-name").textContent = m.name;
      } else if (m.type === "gdrive_auth_url") {
        hideThinking(); dot.className = "online"; sendBtn.disabled = false;
        window.open(m.url, "_blank");
        addMsg("system", "Открываю страницу авторизации Google Drive...\nПосле подтверждения Drive будет привязан автоматически.");
      } else if (m.type === "thinking") {
        showThinking();
      } else if (m.type === "message") {
        hideThinking(); addMsg("mira", m.content);
        dot.className = "online"; sendBtn.disabled = false;
      } else if (m.type === "system") {
        hideThinking(); addMsg("system", m.content);
        dot.className = "online"; sendBtn.disabled = false;
      } else if (m.type === "error") {
        hideThinking(); addMsg("error", m.content);
        dot.className = "online"; sendBtn.disabled = false;
      } else if (m.type === "files") {
        renderFiles(m.files);
      }
    };

    ws.onclose = e => {
      dot.className = ""; sendBtn.disabled = true; hideThinking();
      if (e.code === 4001) { localStorage.removeItem(SESSION_KEY); }
      else { setTimeout(connect, 3000); }
    };
    ws.onerror = () => ws.close();
  }

  function showLogin(bot) {
    overlay.style.display = "flex";
    if (!bot) { document.getElementById("tg-btn-wrap").innerHTML = "<span style='color:var(--muted);font-size:13px'>Бот не настроен</span>"; return; }
    const wrap = document.getElementById("tg-btn-wrap");
    if (wrap.querySelector("script")) return;
    wrap.innerHTML = "";
    const s = document.createElement("script");
    s.src = "https://telegram.org/js/telegram-widget.js?22";
    s.setAttribute("data-telegram-login", bot);
    s.setAttribute("data-size", "large");
    s.setAttribute("data-onauth", "onTelegramAuth(user)");
    s.setAttribute("data-request-access", "write");
    s.async = true;
    wrap.appendChild(s);
  }

  window.onTelegramAuth = user => {
    fetch("/auth/telegram?" + new URLSearchParams(user))
      .then(r => r.json())
      .then(d => {
        if (d.ok) {
          localStorage.setItem(SESSION_KEY, d.session);
          overlay.style.display = "none";
          connect();
        }
      });
  };

  /* Commands */
  function sendCmd(cmd) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    if (cmd === "clear") {
      if (!confirm("Очистить историю разговора?")) return;
      msgsEl.innerHTML = "";
    }
    if (cmd === "forget" && !confirm("Сбросить профиль и историю полностью?")) return;
    if (cmd === "files") {
      const panel = document.getElementById("files-panel");
      panel.style.display = panel.style.display === "none" ? "block" : "none";
    }
    if (cmd.startsWith("gdrive_get ")) {
      const id = prompt("ID файла с Google Drive:", "");
      if (!id) return;
      cmd = "gdrive_get " + id;
    }
    if (cmd === "gdrive_list") {
      const folder = prompt("Папка (Enter = root):", "root");
      cmd = folder ? "gdrive_list " + folder : "gdrive_list root";
    }
    if (cmd.startsWith("gsheet ")) {
      const sid = prompt("ID таблицы Google Sheets:", "");
      if (!sid) return;
      const rng = prompt("Диапазон (Enter = A1:Z100):", "A1:Z100") || "A1:Z100";
      cmd = "gsheet " + sid + " " + rng;
    }
    if (cmd.startsWith("gsheet_create ")) {
      const title = prompt("Название новой таблицы:", "");
      if (!title) return;
      cmd = "gsheet_create " + title;
    }
    if (cmd.startsWith("gcal_create ")) {
      const text = prompt("Опиши событие (например: Встреча с Колей завтра в 15:00):", "");
      if (!text) return;
      cmd = "gcal_create " + text;
    }
    if (cmd.startsWith("remind ")) {
      const dt = prompt("Дата/время (ISO: 2026-05-13T05:10):", "");
      if (!dt) return;
      const msg = prompt("Текст напоминания:", "");
      if (!msg) return;
      cmd = "remind " + dt + " " + msg;
    }
    if (cmd.startsWith("remind_cancel ")) {
      const tid = prompt("ID напоминания для отмены:", "");
      if (!tid) return;
      cmd = "remind_cancel " + tid;
    }
    if (cmd === "gdrive_login") {
      showThinking();
      dot.className = "thinking";
      sendBtn.disabled = true;
    }
    ws.send(JSON.stringify({type: "command", cmd}));
  }

  /* File upload */
  async function uploadFiles(fileList) {
    for (const file of fileList) {
      const fd = new FormData();
      fd.append("file", file);
      addMsg("system", `Загружаю: ${file.name}...`);
      try {
        const r = await fetch(`/upload?session=${encodeURIComponent(sess())}`, {method:"POST", body:fd});
        const d = await r.json();
        if (d.ok) {
          const kb = (d.size / 1024).toFixed(1);
          addMsg("system", `Файл загружен: ${d.filename} (${kb} КБ)\nМира может с ним поработать.`);
          if (ws?.readyState === WebSocket.OPEN)
            ws.send(JSON.stringify({type:"message", content:`Я загрузил файл: ${d.filename}. Посмотри его в папке inbox.`}));
        } else {
          addMsg("error", `Ошибка загрузки: ${d.detail || "неизвестная"}`);
        }
      } catch(e) {
        addMsg("error", `Ошибка: ${e.message}`);
      }
    }
    document.getElementById("file-input").value = "";
  }

  /* Files panel */
  function renderFiles(files) {
    const content = document.getElementById("files-content");
    if (!files.length) {
      content.innerHTML = "<p id='files-empty'>Нет файлов</p>";
      return;
    }
    const byDir = {};
    for (const f of files) {
      (byDir[f.dir] = byDir[f.dir] || []).push(f);
    }
    const labels = {inbox: "📥 Входящие", output: "📤 Результаты"};
    content.innerHTML = Object.entries(byDir).map(([dir, fs]) => `
      <div class="file-section">
        <div class="file-section-title">${labels[dir] || dir}</div>
        ${fs.map(f => {
          const kb = (f.size / 1024).toFixed(1);
          return `<div class="file-item">
            <span>${f.name}<small>${kb} КБ</small></span>
            <a class="file-dl" href="/files/${dir}/${encodeURIComponent(f.name)}?session=${encodeURIComponent(sess())}" download="${f.name}">Скачать</a>
          </div>`;
        }).join("")}
      </div>`).join("");
  }

  /* Messages */
  function send() {
    const text = inputEl.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    addMsg("user", text);
    ws.send(JSON.stringify({type: "message", content: text}));
    inputEl.value = ""; inputEl.style.height = "auto";
    sendBtn.disabled = true; dot.className = "thinking";
  }

  function addMsg(role, text) {
    const el = document.createElement("div");
    el.className = `msg ${role}`;
    el.textContent = text;
    msgsEl.appendChild(el);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  function showThinking() {
    if (thinkEl) return;
    thinkEl = document.createElement("div");
    thinkEl.className = "thinking-wrap";
    thinkEl.innerHTML = "<span></span><span></span><span></span>";
    msgsEl.appendChild(thinkEl);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }
  function hideThinking() { if (thinkEl) { thinkEl.remove(); thinkEl = null; } }

  /* Input */
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px";
  });
  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener("click", send);

  setInterval(() => { if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type:"ping"})); }, 25000);

  connect();
</script>
</body>
</html>
